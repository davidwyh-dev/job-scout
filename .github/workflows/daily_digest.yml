name: Daily Job Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM ET (UTC-4) daily
  workflow_dispatch: {}    # Manual trigger

permissions:
  contents: write          # Needed to commit state file back

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Scout
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MUSE_API_KEY: ${{ secrets.MUSE_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          PYTHONPATH: src
        run: python -m job_scout.main -v

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_jobs.json
          git diff --staged --quiet || git commit -m "Update sent jobs state [skip ci]"
          git push
